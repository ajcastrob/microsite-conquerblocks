<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="main.js"></script>
    <title>Conquerblocks- academia tecnológica</title>
  </head>
  <body>
    <header>
      <navbar-conquer></navbar-conquer>
    </header>

    <main>
      <section class="hero container">
        <div class="container-hero">
          <header class="hero__header">
            <span class="hero__header-subtitle"
              >Aprendizaje para conquistar</span
            >
            <h1>Máster Full <span class="hero__header-span">Stack</span></h1>

            <p class="hero__description">
              Vive el futuro de la web con profesores de alta calidad. Domina el
              stack completo de un desarrollador sin miedo a volver atrás.
            </p>
          </header>

          <figure class="hero__header-img">
            <img src="assets/image-hero.avif" alt="image-hero" />
          </figure>
        </div>

        <div class="hero__buttons">
          <button class="hero__buttons-access">INICIA AHORA</button>
          <button class="hero__buttons-info">Otros másters</button>
        </div>
      </section>

      <section class="statistics container">
        <div class="statistics__container">
          <article class="statistics__card">
            <h3 class="statistics__number">24+</h3>
            <span class="statistics__label">Módulos</span>
          </article>
          <article class="statistics__card">
            <h3 class="statistics__number">180h</h3>
            <span class="statistics__label">Contenido</span>
          </article>
          <article class="statistics__card">
            <h3 class="statistics__number">98%</h3>
            <span class="statistics__label">Éxito</span>
          </article>
        </div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
