<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../sass/main.scss" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Epilogue:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="../main.js"></script>
    <title>Conquerblocks — Contacto</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
    <header>
      <navbar-conquer></navbar-conquer>
    </header>

    <main id="main-content">
      <!-- ─── 1. Hero ──────────────────────────────────────────── -->
      <section class="contacto-hero container">
        <span class="contacto-hero__subtitle">Contacto</span>
        <h1>Hablemos</h1>
        <p class="contacto-hero__description">
          Agenda una llamada de orientación gratuita con nuestro equipo para
          descubrir cómo podemos impulsar tu carrera tech.
        </p>
      </section>

      <!-- ─── 2. Content Grid ──────────────────────────────────── -->
      <section class="contacto-grid container">
        <!-- Info -->
        <div class="contacto-grid__info">
          <h2 class="contacto-grid__info-title">Información de contacto</h2>

          <div class="contacto-grid__field-group">
            <div class="contacto-grid__field">
              <label class="contacto-grid__label" for="contacto"
                >Número de contacto</label
              >
              <div class="contacto-grid__input-wrapper">
                <i class="ri-phone-line"></i>
                <input
                  class="contacto-grid__input"
                  type="text"
                  id="contacto"
                  value="123 456 789"
                  disabled
                />
              </div>
            </div>

            <div class="contacto-grid__field">
              <label class="contacto-grid__label" for="mail_conquer"
                >Correo electrónico</label
              >
              <div class="contacto-grid__input-wrapper">
                <i class="ri-mail-line"></i>
                <input
                  class="contacto-grid__input"
                  type="text"
                  id="mail_conquer"
                  value="conquer@negocios.com"
                  disabled
                />
              </div>
            </div>
          </div>

          <a
            class="contacto-grid__cta"
            href="#"
          >
            <i class="ri-calendar-line"></i>
            Agendar llamada
          </a>
        </div>

        <!-- Map -->
        <div class="contacto-grid__map-card">
          <h2 class="contacto-grid__map-title">Estamos ubicados en</h2>
          <div class="contacto-grid__map-wrapper">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3036.9948019795097!2d-3.6654546!3d40.431114!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd4229003735bf3f%3A0x2d80dd81d86bfbd7!2sConquer%20Finance%20(Formaci%C3%B3n%20en%20inversi%C3%B3n)!5e0!3m2!1ses!2spe!4v1768110852911!5m2!1ses!2spe"
              width="600"
              height="450"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="Oficinas de Conquerblocks"
            ></iframe>
          </div>
        </div>
      </section>
    </main>
  <footer-conquer></footer-conquer>
  </body>
</html>
