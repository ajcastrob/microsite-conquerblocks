<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <title>Conquerblocks — Iniciar sesión</title>
    <script type="module" crossorigin src="/microsite-conquerblocks/assets/main-CEQsWIaX.js"></script>
    <link rel="stylesheet" crossorigin href="/microsite-conquerblocks/assets/main-Cas6FL4i.css">
  </head>
  <body>
    <header>
      <navbar-conquer></navbar-conquer>
    </header>

    <main>
      <!-- ─── 1. Hero ──────────────────────────────────────────── -->
      <section class="login-hero container">
        <span class="login-hero__subtitle">Acceso</span>
        <h1>Inicia sesión</h1>
      </section>

      <!-- ─── 2. Form ──────────────────────────────────────────── -->
      <section class="login-form container">
        <div class="login-form__card">
          <div class="login-form__icon">
            <i class="ri-lock-line"></i>
          </div>

          <form method="post" action="/">
            <div class="login-form__field">
              <label class="login-form__label" for="user">Usuario</label>
              <div class="login-form__input-wrapper">
                <i class="ri-user-line"></i>
                <input
                  class="login-form__input"
                  type="text"
                  name="user"
                  id="user"
                  placeholder="Tu usuario o email"
                />
              </div>
            </div>

            <div class="login-form__field">
              <label class="login-form__label" for="clave">Contraseña</label>
              <div class="login-form__input-wrapper">
                <i class="ri-lock-line"></i>
                <input
                  class="login-form__input"
                  type="password"
                  name="clave"
                  id="clave"
                  placeholder="Tu contraseña"
                />
              </div>
            </div>

            <div class="login-form__actions">
              <button class="login-form__submit" type="submit">
                Entrar
                <i class="ri-arrow-right-line"></i>
              </button>
              <a class="login-form__forgot" href="#"
                >¿Olvidaste tu contraseña?</a
              >
            </div>
          </form>

          <p class="login-form__register">
            ¿No tienes cuenta? <a href="/microsite-conquerblocks/pages/registro.html">Regístrate</a>
          </p>
        </div>
      </section>
    </main>
  <footer-conquer></footer-conquer>
  </body>
</html>
